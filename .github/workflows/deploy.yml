name: Deploy Cost Alert System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-lambdas:
    name: Validate Lambda Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install boto3 for syntax checking
        run: pip install boto3

      - name: Validate alert Lambda syntax
        run: python3 -m py_compile lambda/alert/handler.py && echo "alert/handler.py OK"

      - name: Validate weekly Lambda syntax
        run: python3 -m py_compile lambda/weekly/handler.py && echo "weekly/handler.py OK"

      - name: Run Lambda import test
        run: |
          python3 -c "
          import ast, sys
          for f in ['lambda/alert/handler.py', 'lambda/weekly/handler.py']:
              with open(f) as fh:
                  ast.parse(fh.read())
              print(f'PASSED: {f}')
          "

  test-lambda:
    name: Test Lambda via AWS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Invoke weekly Lambda to verify it is live
        run: |
          aws lambda invoke \
            --function-name costalert-weekly \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json
          echo ""
          STATUS=$(python3 -c "import json; d=json.load(open('response.json')); print(d.get('statusCode', 500))")
          if [ "$STATUS" = "200" ]; then
            echo "Weekly Lambda healthy"
          else
            echo "Lambda returned non-200 status"
            exit 1
          fi

      - name: Summary
        run: |
          echo "Cost Alert System is live"
          echo "Alert Lambda:  costalert-alert"
          echo "Weekly Lambda: costalert-weekly"
          echo "Schedule:      Every Sunday 8AM UTC"
